<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Light background -->
  <rect width="256" height="256" fill="#ffffff"/>
  
  <!-- Dark PS monogram -->
  <text x="128" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="140" font-weight="700" text-anchor="middle" fill="#1a1a1a" letter-spacing="-8">PS</text>
  
  <!-- Subtle blue accent line in corner -->

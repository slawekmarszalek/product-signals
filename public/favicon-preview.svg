<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background with rounded corners (16% radius, like Linear/Notion style) -->
  <rect width="32" height="32" rx="5" fill="#0f172a"/>
  <!-- "PS" text — tight tracking, centered with ~25% padding on all sides -->
  <!-- Canvas 32px, text occupies roughly 8–20px range horizontally, 10–22px vertically -->
  <text
    x="16"
    y="21"
    font-size="13"
    font-weight="700"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    text-anchor="middle"
    fill="#ffffff"
    letter-spacing="-0.5"
  >PS</text>
</svg>
